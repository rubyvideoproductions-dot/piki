<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>peak. | Contact</title>
  <link rel="icon" href="assets/logo.png" type="image/png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    *::-webkit-scrollbar { display: none; }
    html, body { scrollbar-width: none; -ms-overflow-style: none; }

    body {
      background: #0a0a0a;
      font-family: 'Inter', -apple-system, system-ui, sans-serif;
      color: #e0e0e0;
      overflow-x: hidden;
      min-height: 100vh;
    }

    /* ===== LAVA LAMP BACKGROUND ===== */
    .lava-bg {
      position: fixed;
      inset: 0;
      overflow: hidden;
      pointer-events: none;
      z-index: 0;
    }

    .lava-blob {
      position: absolute;
      border-radius: 50%;
      filter: blur(100px);
      opacity: 0.45;
      will-change: transform;
    }

    .lava-blob-1 {
      width: 600px; height: 500px;
      background: radial-gradient(circle, rgba(74, 14, 46, 0.8) 0%, rgba(61, 0, 29, 0.4) 50%, transparent 70%);
      left: -5%; top: 15%;
      animation: lavaFloat1 25s ease-in-out infinite;
    }
    .lava-blob-2 {
      width: 500px; height: 450px;
      background: radial-gradient(circle, rgba(46, 0, 62, 0.7) 0%, rgba(25, 0, 40, 0.3) 50%, transparent 70%);
      right: -5%; top: 50%;
      animation: lavaFloat2 30s ease-in-out infinite;
    }
    .lava-blob-3 {
      width: 400px; height: 350px;
      background: radial-gradient(circle, rgba(26, 11, 46, 0.6) 0%, rgba(10, 0, 20, 0.3) 50%, transparent 70%);
      left: 40%; bottom: 5%;
      animation: lavaFloat3 22s ease-in-out infinite;
    }

    @keyframes lavaFloat1 {
      0%, 100% { transform: translate(0, 0) scale(1); }
      25% { transform: translate(80px, -50px) scale(1.1); }
      50% { transform: translate(-30px, 70px) scale(0.95); }
      75% { transform: translate(50px, 30px) scale(1.05); }
    }
    @keyframes lavaFloat2 {
      0%, 100% { transform: translate(0, 0) scale(1); }
      25% { transform: translate(-60px, 40px) scale(1.08); }
      50% { transform: translate(50px, -60px) scale(0.92); }
      75% { transform: translate(-40px, -20px) scale(1.03); }
    }
    @keyframes lavaFloat3 {
      0%, 100% { transform: translate(0, 0) scale(1); }
      25% { transform: translate(40px, 60px) scale(0.95); }
      50% { transform: translate(-70px, -30px) scale(1.1); }
      75% { transform: translate(30px, -50px) scale(1.02); }
    }

    .glass-overlay {
      position: fixed;
      inset: 0;
      backdrop-filter: blur(80px) saturate(1.4);
      -webkit-backdrop-filter: blur(80px) saturate(1.4);
      background: rgba(10, 10, 10, 0.4);
      pointer-events: none;
      z-index: 1;
    }

    /* ===== HEADER ===== */
    .header {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      background: transparent;
    }

    .nav {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      max-width: 56rem;
      margin: 2rem auto;
      padding: 1rem 4rem;
    }

    .nav-left { display: flex; }
    .nav-right { justify-self: end; display: flex; }

    .logo {
      display: flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
    }

    .logo-text {
      font-weight: 700;
      text-transform: lowercase;
      font-size: 2.4rem;
      color: #ffffff;
    }

    .nav-link {
      font-size: 1.4rem;
      font-weight: 500;
      color: #cccccc;
      text-decoration: none;
      transition: opacity 0.3s;
    }
    .nav-link:hover { opacity: 0.6; }

    /* ===== CONTACT PAGE ===== */
    .contact-page {
      position: relative;
      z-index: 10;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 8rem 2rem 3rem;
      gap: 3rem;
    }

    /* Title */
    .contact-hero {
      text-align: center;
    }

    .contact-title {
      font-size: clamp(2.5rem, 6vw, 4.5rem);
      font-weight: 300;
      color: #ffffff;
      letter-spacing: -0.03em;
      margin-bottom: 0.75rem;
    }

    .contact-subtitle {
      font-size: 1.1rem;
      color: rgba(255, 255, 255, 0.45);
      font-weight: 400;
      letter-spacing: 0.02em;
    }

    /* Info cards */
    .contact-cards {
      display: flex;
      gap: 2rem;
      max-width: 700px;
      width: 100%;
    }

    .info-block {
      flex: 1;
      padding: 2rem;
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.02);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      transition: border-color 0.3s ease;
    }

    .info-block:hover {
      border-color: rgba(255, 80, 128, 0.2);
    }

    .info-block-icon {
      width: 40px;
      height: 40px;
      border-radius: 10px;
      background: rgba(255, 80, 128, 0.1);
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 1rem;
    }

    .info-block-icon svg {
      width: 20px;
      height: 20px;
      color: #ff5080;
      stroke: currentColor;
    }

    .info-block-label {
      font-size: 0.8rem;
      font-weight: 500;
      color: rgba(255, 255, 255, 0.4);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 0.5rem;
    }

    .info-block-value {
      font-size: 1.05rem;
      font-weight: 400;
      color: #ffffff;
    }

    .info-block-value a {
      color: #ffffff;
      text-decoration: none;
      transition: color 0.3s;
    }

    .info-block-value a:hover {
      color: #ff5080;
    }

    /* Email CTA button */
    .email-cta {
      display: inline-flex;
      align-items: center;
      gap: 0.75rem;
      padding: 1.1rem 2.5rem;
      background: linear-gradient(135deg, #ff3366, #ff5080);
      color: #ffffff;
      border: none;
      border-radius: 9999px;
      font-family: 'Inter', sans-serif;
      font-size: 1.05rem;
      font-weight: 600;
      letter-spacing: 0.02em;
      text-decoration: none;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .email-cta:hover {
      background: linear-gradient(135deg, #ff5080, #ff6090);
      box-shadow: 0 10px 40px -10px rgba(255, 50, 100, 0.5);
      transform: translateY(-2px);
    }

    .email-cta svg {
      width: 20px;
      height: 20px;
    }

    /* Footer */
    .contact-footer {
      position: relative;
      z-index: 10;
      padding: 2rem;
      text-align: center;
      border-top: 1px solid rgba(255, 255, 255, 0.06);
      max-width: 700px;
      width: 100%;
    }

    .contact-footer span {
      font-size: 0.75rem;
      color: rgba(255, 255, 255, 0.25);
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 768px) {
      .nav {
        display: flex;
        flex-direction: row;
        justify-content: space-between;
        padding: 1rem 2rem;
        margin: 1rem auto;
        width: 100%;
      }

      .contact-page {
        padding: 7rem 1.25rem 2rem;
      }

      .contact-cards {
        flex-direction: column;
        gap: 1.5rem;
      }

      .info-block {
        padding: 1.5rem;
      }
    }

    /* Animations */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .fade-up {
      opacity: 0;
      animation: fadeUp 0.7s ease forwards;
    }
    .fade-up-d1 { animation-delay: 0.1s; }
    .fade-up-d2 { animation-delay: 0.25s; }
    .fade-up-d3 { animation-delay: 0.4s; }
    .fade-up-d4 { animation-delay: 0.55s; }
  </style>
</head>
<body>

  <!-- Lava Background -->
  <div class="lava-bg">
    <div class="lava-blob lava-blob-1"></div>
    <div class="lava-blob lava-blob-2"></div>
    <div class="lava-blob lava-blob-3"></div>
  </div>
  <div class="glass-overlay"></div>

  <!-- Header -->
  <header class="header">
    <nav class="nav">
      <div class="nav-left">
        <a href="works.html" class="nav-link">works</a>
      </div>
      <a href="index.html" class="logo">
        <span class="logo-text">peak.</span>
      </a>
      <div class="nav-right">
        <a href="contact.html" class="nav-link">contact</a>
      </div>
    </nav>
  </header>

  <!-- Contact Content -->
  <div class="contact-page">

    <!-- Hero -->
    <div class="contact-hero fade-up">
      <h1 class="contact-title">Let's Talk</h1>
      <p class="contact-subtitle">Ready to bring your vision to the peak?</p>
    </div>

    <!-- Info Cards -->
    <div class="contact-cards">

      <div class="info-block fade-up fade-up-d1">
        <div class="info-block-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="M22 7l-10 7L2 7"/></svg>
        </div>
        <div class="info-block-label">Email</div>
        <div class="info-block-value"><a href="mailto:contact@peakstudios.video">contact@peakstudios.video</a></div>
      </div>

      <div class="info-block fade-up fade-up-d2">
        <div class="info-block-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg>
        </div>
        <div class="info-block-label">Location</div>
        <div class="info-block-value">Tel Aviv, Israel</div>
      </div>

    </div>

    <!-- Email Button with pre-filled template -->
    <a href="mailto:contact@peakstudios.video?subject=Interested%20in%20working%20with%20peak.&body=Hi%20peak.%20team%2C%0A%0AI%E2%80%99d%20love%20to%20discuss%20a%20potential%20collaboration.%0A%0ALooking%20forward%20to%20hearing%20from%20you!" class="email-cta fade-up fade-up-d3">
      Get in Touch
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 2L11 13"/><path d="M22 2L15 22L11 13L2 9L22 2Z"/></svg>
    </a>

    <!-- Footer -->
    <div class="contact-footer fade-up fade-up-d4">
      <span>&copy; 2026 peak.</span>
    </div>

  </div>

</body>
</html>
