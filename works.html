<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>peak. | Works</title>
  <link rel="icon" href="assets/logo.png" type="image/png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <style>
    body {
      background: #000;
      min-height: 100vh;
    }

    .works-page {
      position: relative;
      z-index: 10;
      padding: 8rem 2rem 6rem;
      max-width: 1200px;
      margin: 0 auto;
      opacity: 0;
      animation: fadeIn 0.8s ease 0.2s forwards;
    }

    @keyframes fadeIn {
      to { opacity: 1; }
    }

    /* === SHOWREEL HERO === */
    .works-showreel {
      margin-bottom: 3rem;
    }

    .works-showreel-video {
      position: relative;
      aspect-ratio: 16 / 9;
      border-radius: 12px;
      overflow: hidden;
      cursor: pointer;
    }

    .works-showreel-player {
      position: relative;
      width: 100%;
      height: 100%;
    }

    .works-showreel-player iframe {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border: none;
      pointer-events: none;
    }

    .works-showreel-video.active .works-showreel-player iframe {
      pointer-events: auto;
    }

    .works-showreel-video .work-play-btn svg {
      width: 64px;
      height: 64px;
    }

    .works-showreel-video.active .work-play-btn {
      display: none;
    }

    /* === GRID === */
    .works-page-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 2.5rem;
    }

    .work-card {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    .work-card-video {
      position: relative;
      aspect-ratio: 16 / 9;
      border-radius: 8px;
      overflow: hidden;
      cursor: pointer;
    }

    .work-card-player {
      position: relative;
      width: 100%;
      height: 100%;
    }

    .work-card-player iframe {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border: none;
      pointer-events: none;
    }

    .work-card-player img,
    .works-showreel-player img {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .work-card-video.active .work-card-player iframe {
      pointer-events: auto;
    }

    .work-card-video.active .work-play-btn {
      display: none;
    }

    /* === PLAY BUTTON (shared) === */
    .work-play-btn {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 3;
      cursor: pointer;
      background: transparent;
      transition: background 0.3s ease;
    }

    .work-play-btn svg {
      width: 48px;
      height: 48px;
      color: rgba(255, 255, 255, 0);
      filter: drop-shadow(0 2px 8px rgba(0, 0, 0, 0.4));
      transition: color 0.3s ease, transform 0.3s ease;
    }

    .works-showreel-video:hover .work-play-btn svg,
    .work-card-video:hover .work-play-btn svg {
      color: rgba(255, 255, 255, 0.9);
      transform: scale(1.1);
    }

    .works-showreel-video:hover .work-play-btn,
    .work-card-video:hover .work-play-btn {
      background: rgba(0, 0, 0, 0.2);
    }

    /* === FOOTER === */
    .works-page-footer {
      margin-top: 6rem;
      padding-top: 2rem;
      border-top: 1px solid rgba(255, 255, 255, 0.06);
      font-family: 'Inter', sans-serif;
      font-size: 0.75rem;
      color: #444;
    }

    @media (max-width: 768px) {
      .works-page {
        padding: 7rem 1.5rem 3rem;
      }

      .works-page-grid {
        grid-template-columns: 1fr;
        gap: 1.5rem;
      }

      .works-showreel {
        margin-bottom: 2rem;
      }
    }
  </style>
</head>
<body>

  <header class="header">
    <nav class="nav">
      <div class="nav-left">
        <a href="works.html" class="nav-link">works</a>
      </div>
      <a href="index.html" class="logo">
        <span class="logo-text">peak.</span>
      </a>
      <div class="nav-right">
        <a href="contact.html" class="nav-link">contact</a>
      </div>
    </nav>
  </header>

  <div class="works-page">

    <!-- Showreel — big hero block -->
    <div class="works-showreel">
      <div class="works-showreel-video" data-vimeo-id="1152345652">
        <div class="works-showreel-player">
          <iframe src="https://player.vimeo.com/video/1152345652?autoplay=1&loop=1&muted=1&background=1" frameborder="0" allow="autoplay; fullscreen; picture-in-picture" allowfullscreen></iframe>
        </div>
        <div class="work-play-btn">
          <svg viewBox="0 0 24 24" fill="currentColor"><polygon points="5,3 19,12 5,21"/></svg>
        </div>
      </div>
    </div>

    <!-- Projects grid -->
    <div class="works-page-grid">

      <article class="work-card">
        <div class="work-card-video" data-vimeo-id="1165197450">
          <div class="work-card-player">
            <iframe src="https://player.vimeo.com/video/1165197450?autoplay=1&loop=1&muted=1&background=1" frameborder="0" allow="autoplay; fullscreen; picture-in-picture" allowfullscreen></iframe>
          </div>
          <div class="work-play-btn">
            <svg viewBox="0 0 24 24" fill="currentColor"><polygon points="5,3 19,12 5,21"/></svg>
          </div>
        </div>
      </article>

      <article class="work-card">
        <div class="work-card-video" data-youtube-id="sVxZ4Pma1sg">
          <div class="work-card-player">
            <img src="https://img.youtube.com/vi/sVxZ4Pma1sg/maxresdefault.jpg" alt="" class="work-card-thumb">
          </div>
          <div class="work-play-btn">
            <svg viewBox="0 0 24 24" fill="currentColor"><polygon points="5,3 19,12 5,21"/></svg>
          </div>
        </div>
      </article>

    </div>

    <footer class="works-page-footer">&copy; 2026 peak.</footer>
  </div>

  <script>
    // Click-to-play for all video cards
    document.querySelectorAll('.work-play-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const card = btn.closest('.works-showreel-video') || btn.closest('.work-card-video');
        if (!card || card.classList.contains('active')) return;

        const vimeoId = card.dataset.vimeoId;
        const youtubeId = card.dataset.youtubeId;

        card.classList.add('active');

        if (vimeoId) {
          const iframe = card.querySelector('iframe');
          iframe.src = `https://player.vimeo.com/video/${vimeoId}?autoplay=1&badge=0&autopause=0&player_id=0&app_id=58479`;
        } else if (youtubeId) {
          const player = card.querySelector('.work-card-player') || card.querySelector('.works-showreel-player');
          const thumb = player.querySelector('img');
          const iframe = document.createElement('iframe');
          iframe.src = `https://www.youtube.com/embed/${youtubeId}?autoplay=1&rel=0&modestbranding=1`;
          iframe.frameBorder = '0';
          iframe.allow = 'autoplay; fullscreen; picture-in-picture; encrypted-media';
          iframe.allowFullscreen = true;
          iframe.style.cssText = 'position:absolute;top:0;left:0;width:100%;height:100%;border:none;';
          if (thumb) thumb.remove();
          player.appendChild(iframe);
        }
      });
    });
  </script>

</body>
</html>
